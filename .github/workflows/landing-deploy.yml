name: Deploy Landing to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/**'  # Cambiado a docs/ para documentación
      - 'README.md'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build docs site
        run: |
          echo "# IWAI - Automated Processes" > index.html
          echo "<h1>Zynch SaaS Platform</h1>" >> index.html
          echo "<p>Professional multi-tenant platform for service providers</p>" >> index.html
          echo "<a href='https://github.com/iwaigit/Zynch'>View on GitHub</a>" >> index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './index.html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
